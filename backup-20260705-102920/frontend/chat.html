<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本草链 HerbChain · 需求访谈</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🌿</text></svg>">
<script src="marked.min.js"></script>
<style>
  :root{--green:#1f6b3a;--green-deep:#0f4724;--ink:#1c2a22;--bg:#f7f5ef;--line:#e4e0d4;--muted:#5d6b5d}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);line-height:1.65;display:flex;flex-direction:column;height:100vh}
  header.top{background:var(--green-deep);color:#fff;padding:16px 22px;display:flex;align-items:center;gap:14px}
  header.top .brand{font-size:18px;font-weight:700;letter-spacing:1px}
  header.top small{font-size:12px;color:#9fc0a3;font-weight:400}
  header.top .spacer{flex:1}
  header.top a{color:#cfe6d3;font-size:13px;border:1px solid #2c5a3e;padding:5px 12px;border-radius:6px}
  #gate{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:30px;max-width:440px;width:100%}
  .card h2{font-size:20px;margin-bottom:6px}
  .card p.sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  .card label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
  .card input,.card select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:15px;background:#fff}
  .card input:focus,.card select:focus{outline:none;border-color:var(--green)}
  .btn{display:inline-block;padding:11px 22px;border-radius:8px;font-size:15px;font-weight:600;border:none;cursor:pointer;background:var(--green);color:#fff}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.55;cursor:wait}
  .btn.full{width:100%;margin-top:16px}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  #chat{flex:1;display:none;flex-direction:column;min-height:0}
  #log{flex:1;overflow-y:auto;padding:22px;max-width:820px;width:100%;margin:0 auto}
  .m{max-width:78%;margin:10px 0;display:flex}
  .m.user{margin-left:auto;justify-content:flex-end}
  .m.bot{align-items:flex-start}
  .b{padding:12px 16px;border-radius:14px;font-size:15px;white-space:pre-wrap;word-break:break-word}
  .m.user .b{background:var(--green);color:#fff;border-bottom-right-radius:4px}
  .m.bot .b{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .typing{color:var(--muted);font-size:14px}
  .typing .dot{display:inline-block;animation:bl 1.2s infinite}
  .typing .dot:nth-child(2){animation-delay:.2s}
  .typing .dot:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.25}40%{opacity:1}}
  #bar{border-top:1px solid var(--line);background:#fff;padding:14px 18px}
  #bar .inner{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  #inp{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;resize:none;height:46px;max-height:120px}
  #inp:focus{outline:none;border-color:var(--green)}
  #send{padding:11px 20px;border-radius:10px;border:none;background:var(--green);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  #send:disabled{opacity:.5}
  #tools{max-width:820px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;padding:6px 18px 12px}
  #tools .pill{font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:4px 10px;border-radius:999px}
  #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;align-items:center;justify-content:center;padding:20px}
  #modal.on{display:flex}
  .modal-card{background:#fff;border-radius:12px;max-width:760px;width:100%;max-height:84vh;display:flex;flex-direction:column}
  .modal-card .hd{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .modal-card .hd b{flex:1;font-size:17px}
  .modal-card .bd{padding:20px;overflow-y:auto}
  .modal-card pre{white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.7}
  .modal-card .ft{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  #err{color:#a33;font-size:13px;margin-top:10px;min-height:18px}
  .retry{color:var(--green);text-decoration:underline;cursor:pointer;margin-left:6px}
  /* 对话气泡内的 markdown 渲染 */
  .b{white-space:normal !important}
  .b p{margin:5px 0}
  .b ul,.b ol{margin:5px 0;padding-left:22px}
  .b li{margin:2px 0}
  .b b,.b strong{color:var(--green-deep)}
  .b code{background:#f1efe6;padding:1px 5px;border-radius:4px;font-size:13px}
  .b pre{background:#f1efe6;padding:10px;border-radius:8px;overflow-x:auto}
  .b table{border-collapse:collapse;margin:6px 0;font-size:14px}
  .b th,.b td{border:1px solid var(--line);padding:5px 8px}
  .b th{background:#f1efe6}
  .b blockquote{border-left:3px solid var(--green);padding-left:10px;color:var(--muted);margin:5px 0}
  .mdbody{font-size:14px;line-height:1.75;color:var(--ink);text-align:left}
  .mdbody h1{font-size:20px;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .mdbody h2{font-size:17px;margin:14px 0 6px;color:var(--green-deep)}
  .mdbody h3{font-size:15px;margin:12px 0 5px}
  .mdbody p{margin:7px 0}
  .mdbody ul,.mdbody ol{margin:7px 0;padding-left:22px}
  .mdbody li{margin:3px 0}
  .mdbody b,.mdbody strong{color:var(--green-deep)}
  .mdbody table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13.5px}
  .mdbody th,.mdbody td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
  .mdbody th{background:#f1efe6;font-weight:700}
  .mdbody tr:nth-child(even) td{background:#fafafa}
  .mdbody code{background:#f1efe6;padding:1px 5px;border-radius:4px;font-size:12.5px}
  .mdbody blockquote{border-left:3px solid var(--green);padding-left:12px;color:var(--muted);margin:7px 0}
  .mdsrc{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.7;color:var(--muted);background:#fafafa;padding:12px;border-radius:8px;display:none;text-align:left}
  .seg{display:flex;gap:6px;margin:8px 0}
</style>
</head>
<body>

<header class="top">
  <div class="brand">🌿 本草链 <small>HerbChain · 需求访谈</small></div>
  <div class="spacer"></div>
  <a href="/">官网</a>
</header>

<div id="gate">
  <div class="card">
    <h2>需求访谈</h2>
    <p class="sub">和需求分析师 AI 聊聊你在生意里最真实的工作和痛点。它会先告诉你今天会聊哪几个方面，再带着你一项项过，把系统需求聊清楚。约 10-15 分钟。</p>
    <div style="background:#fff7e6;border:1px solid #e8c97a;border-radius:8px;padding:10px 12px;font-size:13px;color:#7a5b12;margin-bottom:6px">
      ⚠️ <b>税务合规是本次访谈的重点</b>：中药材大货是税务高风险行业（农产品收购发票、进项抵扣、三流一致防虚开）。聊到任何环节，分析师都会顺带问你发票和税务怎么走，请如实说现状——系统会据此把合规做进去。
    </div>
    <label>访问口令</label>
    <input id="access" type="password" placeholder="请输入口令">
    <label>你的称呼</label>
    <input id="name" type="text" placeholder="如：老张 / 王总">
    <label>你的角色</label>
    <select id="role">
      <option value="老板/统筹">老板/统筹</option>
      <option value="产地收购">产地收购</option>
      <option value="生产加工">生产加工</option>
      <option value="销售/合伙人">销售/合伙人</option>
      <option value="财务">财务</option>
      <option value="客户/下游">客户/下游</option>
      <option value="其他">其他</option>
    </select>
    <button class="btn full" id="startBtn" onclick="start()">开始访谈</button>
    <div id="err"></div>
  </div>
</div>

<div id="chat">
  <div id="log"></div>
  <div id="tools">
    <span class="pill" id="pill"></span>
    <button class="btn ghost" onclick="extract()">⤵ 生成需求摘要</button>
    <button class="btn ghost" onclick="newChat()">＋ 新建访谈</button>
  </div>
  <div id="bar"><div class="inner">
    <textarea id="inp" placeholder="说点你实际的工作和痛点…"></textarea>
    <button id="send" onclick="send()">发送</button>
  </div></div>
</div>

<div id="modal"><div class="modal-card">
  <div class="hd"><b>需求摘要</b>
    <div class="seg" style="margin:0">
      <button class="btn ghost" onclick="mdViewC('rendered')">排版</button>
      <button class="btn ghost" onclick="mdViewC('src')">源码</button>
    </div>
    <button class="btn ghost" onclick="copyMd()">复制</button>
    <button class="btn ghost" onclick="dlMd()">下载 .md</button>
    <button class="btn ghost" onclick="printMd($('#mdRendered').innerHTML,'本草链需求摘要')">打印</button>
    <button class="btn ghost" onclick="closeModal()">关闭</button>
  </div>
  <div class="bd">
    <div class="mdbody" id="mdRendered">(生成中…)</div>
    <pre class="mdsrc" id="mdSrc"></pre>
  </div>
</div></div>

<script>
let ACCESS="", SID="", STOKEN="", busy=false, timer=null, secs=0;
function renderMd(t){try{return sanitizeMd(marked.parse(t,{breaks:true}));}catch(e){return esc(t).replace(/\n/g,"<br>");}}
function printMd(html,title){
  const w=window.open("","_blank");if(!w){alert("请允许弹窗以打印");return;}
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(title)+'</title><style>body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;max-width:820px;margin:auto;padding:28px;color:#1c2a22;line-height:1.75}h1{font-size:22px;border-bottom:1px solid #ccc;padding-bottom:6px}h2{font-size:17px;color:#0f4724}h3{font-size:15px}table{border-collapse:collapse;width:100%;font-size:14px}th,td{border:1px solid #ccc;padding:6px 9px;text-align:left;vertical-align:top}th{background:#f1efe6}pre{background:#f1efe6;padding:12px;border-radius:8px;overflow-x:auto}code{background:#f1efe6;padding:1px 5px;border-radius:4px}blockquote{border-left:3px solid #1f6b3a;padding-left:12px;color:#555;margin:8px 0}.msg{margin:10px 0}.u{text-align:right}.u .b{display:inline-block;background:#eef5ef;padding:8px 12px;border-radius:10px;max-width:80%}.a .b{display:inline-block;background:#fff;border:1px solid #ddd;padding:8px 12px;border-radius:10px;max-width:80%}.b p{margin:4px 0}.b ul,.b ol{margin:4px 0;padding-left:22px}</style></head><body>'+html+'</body></html>');
  w.document.close();w.focus();w.print();
}
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
// 从 HTML 字符串创建一个 DOM 元素(修复版:不再用 querySelector 误传 HTML)
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;}

// 支持 ?code= 直链(免去手输口令) 和 ?name= ?role=
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get("code")) $("#access").value=p.get("code");
  if(p.get("name")) $("#name").value=p.get("name");
  if(p.get("role")){const o=$("#role");for(const x of o.options)if(x.value===p.get("role"))o.value=p.get("role");}
})();

function start(){
  ACCESS=$("#access").value.trim();
  if(!ACCESS){$("#err").textContent="请输入访问口令";return;}
  $("#err").textContent="";
  $("#gate").style.display="none";
  $("#chat").style.display="flex";
  $("#pill").textContent=$("#name").value.trim()+" · "+$("#role").value;
  post("", true);
}

function push(role,text){
  const d=el('<div class="m"></div>');
  d.className="m "+(role==="user"?"user":"bot");
  const b=el('<div class="b"></div>');
  b.innerHTML=renderMd(text);
  d.appendChild(b);
  $("#log").appendChild(d);
  $("#log").scrollTop=$("#log").scrollHeight;
}

function startTimer(node){
  secs=0; clearInterval(timer);
  timer=setInterval(()=>{secs++;node.querySelector('.t').textContent="分析师正在思考… "+secs+"s";},1000);
}
function stopTimer(){clearInterval(timer);}

function post(msg, opener){
  if(busy) return;
  busy=true; $("#send").disabled=true;
  // 始终显示"思考中"(含计时),无论是否开场 —— 修复之前开场无反馈的问题
  const tip=el('<div class="m bot"><div class="b"><span class="t">分析师正在思考…</span> <span class="typing"><span class="dot">·</span><span class="dot">·</span><span class="dot">·</span></span></div></div>');
  $("#log").appendChild(tip);
  $("#log").scrollTop=$("#log").scrollHeight;
  startTimer(tip);

  let body={access:ACCESS, opener: !!opener};
  if(SID){ body.session_id=SID; body.session_token=STOKEN; }
  else { body.name=$("#name").value.trim(); body.role=$("#role").value; }
  body.message = opener
    ? "请以本草链需求分析师身份开场：先用3-4句做个自我介绍并给出今天要聊的几个方面(路线图)，然后立刻进入第一个问题。要聊的方面请根据我的角色（"+$("#role").value+"）来选。"
    : msg;

  fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
   .then(r=>r.json())
   .then(d=>{
     stopTimer();
     if(tip.parentNode) tip.parentNode.removeChild(tip);
     if(!d.ok){
       if(d.max){ push("bot","本会话已达上限，可点「生成需求摘要」或「新建访谈」。"); }
       else { push("bot","出错了："+(d.error||"未知")+"  <span class='retry' onclick='retryOpener()'>点此重试</span>");
              // 用 textContent 会让 retry 标签可见为字面量,改用 innerHTML
              $("#log").lastChild.querySelector('.b').innerHTML="出错了："+esc(d.error||"未知")+" <span class='retry' onclick='retryOpener()'>点此重试</span>"; }
       busy=false; $("#send").disabled=false; return;
     }
     SID=d.session_id;
     if(d.session_token) STOKEN=d.session_token;   // 新会话下发,后续须带回
     if(!opener) push("user",msg);
     push("bot",d.reply);
     busy=false; $("#send").disabled=false;
   })
   .catch(e=>{
     stopTimer();
     if(tip.parentNode) tip.parentNode.removeChild(tip);
     push("bot","网络错误："+e);
     $("#log").lastChild.querySelector('.b').innerHTML=esc("网络错误："+e)+" <span class='retry' onclick='retryOpener()'>点此重试</span>";
     busy=false; $("#send").disabled=false;
   });
}

function retryOpener(){
  // 清掉最后那条错误气泡再重试开场
  const log=$("#log");
  if(log.lastChild && log.lastChild.querySelector('.retry')) log.removeChild(log.lastChild);
  post("", true);
}

function send(){
  const t=$("#inp"); const v=t.value.trim();
  if(!v){return;}
  if(busy){return;}
  t.value=""; t.style.height="46px";
  post(v,false);
}
$("#inp").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});
$("#inp").addEventListener("input",e=>{
  e.target.style.height="46px";
  e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";
});

function extract(){
  if(!SID){alert("请先聊几轮再生成摘要");return;}
  $("#mdRendered").innerHTML="<p>(生成中，访谈越长越久，通常 30 秒到 3 分钟，请勿关闭…)</p>";
  $("#mdSrc").textContent="";
  $("#modal").classList.add("on");
  mdViewC('rendered');
  fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({access:ACCESS,session_id:SID,session_token:STOKEN})})
   .then(r=>r.json())
   .then(d=>{
     if(!d.ok){$("#mdRendered").innerHTML="<p>失败："+esc(d.error||"")+"</p>";return;}
     const md=d.markdown||"";
     $("#mdSrc").textContent=md;
     $("#mdRendered").innerHTML=sanitizeMd(marked.parse(md));
     if(d.warning) $("#mdRendered").innerHTML+="<p style='color:#a33'>⚠️ "+esc(d.warning)+"</p>";
   })
   .catch(e=>$("#mdRendered").innerHTML="<p>网络错误："+esc(e)+"</p>");
}
function sanitizeMd(html){const t=document.createElement('template');t.innerHTML=html.trim();const d=t.content.firstChild?document.createElement('div'):document.createElement('div');d.innerHTML=html;d.querySelectorAll('script,style,iframe,object,embed').forEach(n=>n.remove());d.querySelectorAll('*').forEach(n=>{[...n.attributes].forEach(a=>{if(/^on/i.test(a.name))n.removeAttribute(a.name);});});return d.innerHTML;}
function mdViewC(mode){const r=$("#mdRendered"),s=$("#mdSrc");if(mode==='src'){r.style.display='none';s.style.display='block';}else{r.style.display='block';s.style.display='none';}}
function newChat(){
  if(busy) return;
  if(!confirm("开一个新访谈？当前对话已自动保存在服务器。")) return;
  SID=""; STOKEN=""; $("#log").innerHTML=""; post("",true);
}
function closeModal(){$("#modal").classList.remove("on");}
function copyMd(){navigator.clipboard.writeText($("#mdSrc").textContent).then(()=>alert("已复制 Markdown"));}
function dlMd(){const b=new Blob([$("#mdSrc").textContent],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="herbchain-需求-"+(SID||"session")+".md";a.click();}
</script>
</body>
</html>
