<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本草链 · 协同起草 · 靖州茯苓进项税抵扣报告</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>📝</text></svg>">
<script src="chat-code.js"></script>
<link rel="stylesheet" href="toastui-editor.min.css">
<script src="toastui-editor.min.js"></script>
<style>
  :root{--green:#1f6b3a;--green-deep:#0f4724;--ink:#1c2a22;--bg:#f7f5ef;--line:#e4e0d4;--muted:#5d6b5d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);line-height:1.7}
  a{color:inherit;text-decoration:none}
  header.top{background:var(--green-deep);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px}
  header.top .brand{font-size:18px;font-weight:700}
  header.top small{font-size:12px;color:#9fc0a3}
  header.top .spacer{flex:1}
  header.top a{color:#cfe6d3;font-size:13px;border:1px solid #2c5a3e;padding:5px 12px;border-radius:6px}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 24px 80px}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .bar .title{font-size:18px;font-weight:700;flex:1;min-width:200px}
  .bar input{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  .bar input:focus{outline:none;border-color:var(--green)}
  .btn{padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:14px}
  .btn:hover{border-color:var(--green)}
  .btn.green{background:var(--green);color:#fff;border:none}
  .btn.green:disabled{opacity:.5}
  .meta{font-size:13px;color:var(--muted);margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .meta .saved{color:var(--green-deep)}
  .meta .dirty{color:#a33}
  .note{background:#eef7ef;border:1px solid #bfe3cf;border-radius:8px;padding:10px 12px;font-size:13px;color:var(--green-deep);margin-bottom:12px}
  .banner{display:none;background:#fff7e6;border:1px solid #e8c97a;border-radius:8px;padding:10px 12px;font-size:14px;color:#7a5b12;margin-bottom:12px}
  .banner.on{display:block}
  .banner button{margin-left:10px}
  #editor{min-height:62vh}
  /* Toast UI 主题微调 */
  .toastui-editor-defaultUI{border-radius:10px;border:1px solid var(--line)}
  .toastui-editor-defaultUI-toolbar{background:#fafaf6}
  #gate{max-width:440px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:30px;text-align:center}
  #gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-size:15px;margin:8px 0}
  #gate .err{color:#a33;font-size:13px;min-height:18px}
</style>
</head>
<body>

<header class="top">
  <div class="brand">📝 协同起草 <small>本草链 HerbChain</small></div>
  <div class="spacer"></div>
  <a href="/">官网</a>
</header>

<div id="gate">
  <h2 style="margin-bottom:6px">协同起草：访问</h2>
  <p style="color:var(--muted);font-size:14px;margin-bottom:12px">多人共编这份报告，富文本所见即所得，自动保存、自动拉取他人更新。</p>
  <input id="g_access" type="password" placeholder="访问口令">
  <input id="g_editor" type="text" placeholder="你的称呼（用于显示编辑者）">
  <button class="btn green" style="width:100%;margin-top:8px" onclick="enter()">进入起草</button>
  <p class="err" id="g_err"></p>
</div>

<div id="app" style="display:none">
  <div class="wrap">
    <div class="bar">
      <div class="title" id="docTitle">关于解决靖州茯苓（中药材）产业进项税抵扣困难的报告</div>
      <button class="btn" onclick="copyMd()">复制</button>
      <button class="btn" onclick="dlMd()">下载 .md</button>
      <button class="btn green" id="saveBtn" onclick="save(true)">保存</button>
    </div>
    <div class="meta">
      <span id="m_saved" class="saved">加载中…</span>
      <span id="m_dirty" class="dirty" style="display:none">● 有未保存修改</span>
      <span style="color:var(--muted)">文档ID: <b id="m_doc"></b></span>
      <span style="color:var(--muted)">编辑者: <input id="editorName" style="padding:4px 8px;font-size:13px;width:120px;border:1px solid var(--line);border-radius:6px"></span>
    </div>
    <div class="note">
      🤝 <b>协同规则</b>：富文本所见即所得编辑（可切 Markdown 源码模式）；边写边自动保存；每 4 秒拉取他人更新——本地无改动自动同步，有改动则提示拉取避免覆盖。两人同时各改一段可能冲突，建议分段分工。
    </div>
    <div class="banner" id="banner"></div>
    <div id="editor"></div>
  </div>
</div>

<script>
let ACCESS="", DOC="", REV="", dirty=false, loading=false, pollTimer=null, saveTimer=null, lastSavedText="", editor=null;
const $=s=>document.querySelector(s);

(function(){
  const p=new URLSearchParams(location.search);
  if(p.get("code")) window.CHAT_CODE=p.get("code");
  if(window.CHAT_CODE){$("#g_access").value=window.CHAT_CODE;}
  DOC=p.get("doc")||"jingzhou-fuling-report";
})();

const SEED=`**关于解决靖州茯苓（中药材）产业进项税抵扣困难的报告**

**一、产业现状**
靖州是"中国茯苓之乡"，全国茯苓最大集散地，年交易量约8万吨，约占全国总量的70%，出口量占全国的2/3。本地企业XX家，年销售额合计XX亿元。

**二、当前面临的税负困局**
1. 上游货源经多层转手，无法取得自产农产品收购发票（9%抵扣）；
2. 中间加工户为自然人，代开仅1%普票，无法抵扣进项；
3. 下游药企90%以上要求开具9%增值税专用发票；
4. 进项断链导致实缴税负远超毛利，企业普遍亏损。

**三、政策依据与先例**
（详见首页"政策依据"栏目：增值税法、财税2012 38号/2013 57号、公告2026 10号；陕黔桂皖宁湘6省先例。）

**四、政策诉求**
1. 比照安徽"中药材商品交易中心"模式，将靖州茯苓集散地收购贸易纳入核定扣除试点；
2. 或明确初加工户比照自产农产品适用收购发票政策。

（带 XX 处请填实际数据。）
`;

function enter(){
  ACCESS=$("#g_access").value.trim();
  const ed=$("#g_editor").value.trim()||"匿名";
  if(!ACCESS){$("#g_err").textContent="请输入口令";return;}
  $("#g_err").textContent="";
  $("#gate").style.display="none";
  $("#app").style.display="block";
  $("#m_doc").textContent=DOC;
  $("#editorName").value=ed;
  // 初始化富文本编辑器
  editor=new toastui.Editor({
    el:$("#editor"),
    height:"70vh",
    initialEditType:"wysiwyg",
    previewStyle:"tab",
    usageStatistics:false,
    events:{ change: onEditorChange }
  });
  load(true);
  pollTimer=setInterval(poll,4000);
}

function onEditorChange(){
  if(loading)return;
  dirty=true; $("#m_dirty").style.display="inline";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>save(false),2000);
}

function load(initial){
  fetch("/api/draft?doc="+encodeURIComponent(DOC)+"&access="+encodeURIComponent(ACCESS))
   .then(r=>r.json()).then(d=>{
     if(!d.ok){$("#m_saved").textContent="读取失败: "+(d.error||"");return;}
     loading=true;
     let txt="";
     if(d.exists){ txt=d.text; REV=d.rev; lastSavedText=d.text;
       $("#m_saved").textContent="上次保存: "+(d.updated||"").replace("T"," ")+(d.updated_by?(" · "+d.updated_by):"");
     } else if(initial){ txt=SEED; REV=""; lastSavedText=SEED;
       $("#m_saved").textContent="新文档,未保存(点保存即创建)";
     } else { txt=""; REV=""; lastSavedText=""; }
     editor.setMarkdown(txt);
     loading=false;
     dirty=false; $("#m_dirty").style.display="none";
   }).catch(e=>{loading=false;$("#m_saved").textContent="网络错误";});
}

function poll(){
  fetch("/api/draft?doc="+encodeURIComponent(DOC)+"&access="+encodeURIComponent(ACCESS))
   .then(r=>r.json()).then(d=>{
     if(!d.ok||!d.exists)return;
     if(d.rev && d.rev!==REV){
       if(!dirty){
         loading=true;
         editor.setMarkdown(d.text); loading=false;
         REV=d.rev; lastSavedText=d.text;
         $("#m_saved").textContent="已同步最新: "+(d.updated||"").replace("T"," ")+(d.updated_by?(" · "+d.updated_by):"");
       } else {
         showBanner("⚠️ 他人刚更新了文档，你本地也有未保存改动。建议先复制留存你的内容，再点"+'"拉取最新"'+"。 <button class='btn' onclick='pullLatest()'>拉取最新</button>");
       }
     }
   }).catch(()=>{});
}

function onInput(){ /* 兼容旧调用,无操作 */ }

function showBanner(html){const b=$("#banner");b.innerHTML=html;b.classList.add("on");}
function hideBanner(){$("#banner").classList.remove("on");}

function save(manual){
  if(!editor)return;
  const text=editor.getMarkdown();
  if(!dirty && !manual)return;
  if(text===lastSavedText && !manual){dirty=false;$("#m_dirty").style.display="none";return;}
  const who=($("#editorName").value||$("#g_editor").value||"").trim()||"匿名";
  $("#saveBtn").disabled=true;
  fetch("/api/draft",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({doc:DOC,access:ACCESS,text:text,editor:who,rev:REV})})
   .then(r=>r.json()).then(d=>{
     $("#saveBtn").disabled=false;
     if(d.ok){
       REV=d.rev; lastSavedText=text; dirty=false; $("#m_dirty").style.display="none";
       $("#m_saved").textContent="已保存: "+(d.updated||"").replace("T"," ")+" · "+who;
       hideBanner();
     } else if(d.conflict){
       showBanner("⚠️ "+d.error+" <button class='btn' onclick='pullLatest()'>拉取最新</button>（你当前未保存的内容仍在编辑器中,可先复制留存）");
     } else {
       $("#m_saved").textContent="保存失败: "+(d.error||"");
     }
   }).catch(e=>{$("#saveBtn").disabled=false;$("#m_saved").textContent="网络错误:"+e;});
}

function pullLatest(){
  if(dirty && !confirm("拉取最新会覆盖你当前未保存的改动,确定?"))return;
  load(false);
  hideBanner();
}

function copyMd(){if(editor)navigator.clipboard.writeText(editor.getMarkdown()).then(()=>alert("已复制全文"));}
function dlMd(){if(editor){const b=new Blob([editor.getMarkdown()],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="靖州茯苓进项税抵扣报告.md";a.click();}}
</script>
</body>
</html>
