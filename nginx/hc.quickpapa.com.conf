# HerbChain (本草链) — hc.quickpapa.com
# Static brand landing page. cert path mirrors the existing quickpapa pattern;
# sslrenew issues/renews the Tencent free-DV cert at this path automatically.

# HTTP -> HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    server_name hc.quickpapa.com;

    location ^~ /.well-known/acme-challenge/ {
        root /data/website/hc.quickpapa.com;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hc.quickpapa.com;
    ssl_certificate     /data/certificate/hc.quickpapa.com_nginx/hc.quickpapa.com_bundle.crt;
    ssl_certificate_key /data/certificate/hc.quickpapa.com_nginx/hc.quickpapa.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    root /data/website/hc.quickpapa.com;
    index index.html;

    access_log /var/log/nginx/hc.quickpapa.com.access.log;
    error_log /var/log/nginx/hc.quickpapa.com.error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 问卷后端 -> hc-survey (systemd, 127.0.0.1:5006)
    location /api/ {
        proxy_pass http://127.0.0.1:5006;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }
    location ~* \.(?:css|js|svg|woff2?|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ^~ /.well-known/acme-challenge/ {
        root /data/website/hc.quickpapa.com;
        allow all;
    }

    location ~* \.(?:py|db|db-shm|db-wal|pyc|txt|md|csr|pem|crt|key)$ {
        deny all;
        return 404;
    }
    location ~ /\. {
        deny all;
        return 404;
    }
}