<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本草链 · 问卷与访谈结果</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🌿</text></svg>">
<style>
  :root{--green:#1f6b3a;--green-deep:#0f4724;--ink:#1c2a22;--bg:#f7f5ef;--line:#e4e0d4;--muted:#5d6b5d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);line-height:1.7}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 24px 80px}
  header.top{background:var(--green-deep);color:#fff;padding:22px 0;text-align:center}
  header.top .brand{font-size:20px;font-weight:700;letter-spacing:1px}
  header.top small{font-size:12px;color:#9fc0a3;margin-left:8px}
  .tabs{display:flex;gap:8px;margin:22px 0;border-bottom:1px solid var(--line)}
  .tab{padding:10px 18px;cursor:pointer;border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;background:#fff;color:var(--muted);font-size:15px}
  .tab.active{background:var(--green);color:#fff;border-color:var(--green)}
  .pane{display:none;padding-top:8px}
  .pane.on{display:block}
  .bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:16px 0}
  .stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 20px}
  .stat .n{font-size:28px;font-weight:800;color:var(--green)}
  .stat .l{font-size:13px;color:var(--muted)}
  button,.btn{padding:9px 16px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:14px}
  button:hover{border-color:var(--green)}
  .btn.green{background:var(--green);color:#fff;border:none}
  h2{margin:28px 0 12px;font-size:20px}
  .tally{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin:14px 0}
  .tally .q{font-weight:700;margin-bottom:10px}
  .row{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:15px}
  .barbg{flex:1;height:22px;background:#eee;border-radius:6px;overflow:hidden;min-width:120px}
  .barfg{height:100%;background:var(--green);border-radius:6px}
  .cnt{width:34px;text-align:right;color:var(--muted)}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin:14px 0}
  .card .who{font-weight:700}
  .card .meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .card .a div{padding:3px 0}
  .card .a b{color:var(--green-deep)}
  .card .note{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:14px;color:var(--muted)}
  .empty{color:var(--muted);padding:40px;text-align:center}
  #login{max-width:420px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:30px;text-align:center}
  #login input{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-size:15px;margin:8px 0}
  #login .err{color:#a33;font-size:13px;margin-top:10px}
  /* 访谈列表 */
  .slist .item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin:10px 0;display:flex;align-items:center;gap:14px;cursor:pointer}
  .slist .item:hover{border-color:var(--green)}
  .slist .item .who{font-weight:700;min-width:90px}
  .slist .item .role{font-size:13px;color:#fff;background:var(--green);padding:2px 10px;border-radius:999px}
  .slist .item .info{flex:1;font-size:13px;color:var(--muted)}
  .slist .item .badge{font-size:12px;border:1px solid var(--line);padding:3px 9px;border-radius:6px}
  .slist .item .badge.req{background:#e7f4ec;color:var(--green-deep);border-color:#bfe3cf}
  /* 对话气泡 */
  .dlg .m{max-width:88%;margin:8px 0}
  .dlg .m.u{margin-left:auto;text-align:right}
  .dlg .m .b{display:inline-block;padding:10px 14px;border-radius:12px;font-size:14px;white-space:normal;word-break:break-word;text-align:left}
  .dlg .m .b p{margin:4px 0}
  .dlg .m .b ul,.dlg .m .b ol{margin:4px 0;padding-left:22px}
  .dlg .m .b li{margin:2px 0}
  .dlg .m .b b,.dlg .m .b strong{color:var(--green-deep)}
  .dlg .m .b code{background:#f1efe6;padding:1px 5px;border-radius:4px;font-size:13px}
  .dlg .m .b pre{background:#f1efe6;padding:10px;border-radius:8px;overflow-x:auto}
  .dlg .m .b table{border-collapse:collapse;margin:6px 0;font-size:13px}
  .dlg .m .b th,.dlg .m .b td{border:1px solid var(--line);padding:5px 8px}
  .dlg .m .b th{background:#f1efe6}
  .dlg .m .b blockquote{border-left:3px solid var(--green);padding-left:10px;color:var(--muted);margin:5px 0}
  .dlg .m.u .b{background:var(--green);color:#fff;border-bottom-right-radius:3px}
  .dlg .m.a .b{background:#fff;border:1px solid var(--line);border-bottom-left-radius:3px}
  .back{margin-bottom:12px}
  .reqbox{background:#f4f7f4;border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:14px}
  .reqbox h3{font-size:15px;margin-bottom:8px}
  .reqbox pre{white-space:pre-wrap;font-family:inherit;font-size:13.5px;line-height:1.7}
  .dlghead{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  /* 渲染后的 markdown */
  .mdbody{font-size:14.5px;line-height:1.75;color:var(--ink)}
  .mdbody h1{font-size:22px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .mdbody h2{font-size:18px;margin:16px 0 8px;color:var(--green-deep)}
  .mdbody h3{font-size:16px;margin:14px 0 6px}
  .mdbody p{margin:8px 0}
  .mdbody ul,.mdbody ol{margin:8px 0;padding-left:22px}
  .mdbody li{margin:3px 0}
  .mdbody b,.mdbody strong{color:var(--green-deep)}
  .mdbody table{border-collapse:collapse;width:100%;margin:10px 0;font-size:14px}
  .mdbody th,.mdbody td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .mdbody th{background:#f1efe6;font-weight:700}
  .mdbody tr:nth-child(even) td{background:#fafafa}
  .mdbody code{background:#f1efe6;padding:1px 5px;border-radius:4px;font-size:13px}
  .mdbody pre{background:#f1efe6;padding:12px;border-radius:8px;overflow-x:auto;font-size:13px}
  .mdbody blockquote{border-left:3px solid var(--green);padding-left:12px;color:var(--muted);margin:8px 0}
  .mdsrc{white-space:pre-wrap;font-family:inherit;font-size:13.5px;line-height:1.7;color:var(--muted);background:#fafafa;padding:14px;border-radius:8px;display:none}
  .seg{display:flex;gap:8px;margin:10px 0}
  .seg button{padding:6px 12px;font-size:13px}
</style>
<script src="marked.min.js"></script>
</head>
<body>
<header class="top"><div class="brand">🌿 本草链 <small>HerbChain</small> · 问卷与访谈结果</div></header>

<div class="wrap" id="app">
  <div id="login">
    <h2>查看结果</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:14px">请输入查看令牌</p>
    <input id="tok" type="password" placeholder="令牌">
    <button class="btn green" style="width:100%;margin-top:8px" onclick="enter()">进入</button>
    <p class="err" id="err"></p>
  </div>

  <div id="data" style="display:none">
    <div class="tabs">
      <div class="tab active" id="t-form" onclick="switchTab('form')">问卷结果</div>
      <div class="tab" id="t-chat" onclick="switchTab('chat')">访谈记录</div>
    </div>

    <!-- 问卷结果 -->
    <div class="pane on" id="pane-form">
      <div class="bar">
        <div class="stat"><div class="n" id="cnt">0</div><div class="l">份问卷</div></div>
        <button onclick="exportCSV()">导出问卷 CSV</button>
        <button onclick="exportJSON()">导出问卷 JSON</button>
        <button onclick="loadForm()">刷新</button>
      </div>
      <h2>各题选项分布</h2>
      <div id="tally"></div>
      <h2>全部问卷</h2>
      <div id="rows"></div>
    </div>

    <!-- 访谈记录 -->
    <div class="pane" id="pane-chat">
      <div id="chatList">
        <div class="bar">
          <div class="stat"><div class="n" id="scnt">0</div><div class="l">场访谈</div></div>
          <button onclick="loadSessions()">刷新</button>
        </div>
        <div class="slist" id="slist"></div>
      </div>
      <div id="chatDetail" style="display:none"></div>
    </div>
  </div>
</div>

<!-- 访谈导出预览弹窗 -->
<div id="mdModal" style="display:none">
  <div style="background:#fff;border-radius:12px;max-width:820px;width:100%;max-height:86vh;display:flex;flex-direction:column;margin:auto">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <b style="flex:1;font-size:17px">访谈记录 · Markdown</b>
      <button class="btn" onclick="mdView2('rendered')">排版</button>
      <button class="btn" onclick="mdView2('src')">源码</button>
      <button class="btn" onclick="copyMdModal()">复制</button>
      <button class="btn" onclick="dlMdModal()">下载 .md</button>
      <button class="btn" onclick="printMd($('#mdModalRendered').innerHTML,'本草链访谈记录')">打印</button>
      <button class="btn" onclick="closeMdModal()">关闭</button>
    </div>
    <div style="padding:22px;overflow-y:auto">
      <div class="mdbody" id="mdModalRendered"></div>
      <pre class="mdsrc" id="mdModalSrc" style="display:none"></pre>
    </div>
  </div>
</div>
<style>#mdModal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;align-items:center;justify-content:center;padding:20px}#mdModal.on{display:flex}</style>

<script>
let TOKEN="", CHAT=[];
function renderMd(t){try{return sanitizeMd(marked.parse(t,{breaks:true}));}catch(e){return esc(t).replace(/\n/g,"<br>");}}
function printMd(html,title){
  const w=window.open("","_blank");if(!w){alert("请允许弹窗以打印");return;}
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(title)+'</title><style>body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;max-width:820px;margin:auto;padding:28px;color:#1c2a22;line-height:1.75}h1{font-size:22px;border-bottom:1px solid #ccc;padding-bottom:6px}h2{font-size:17px;color:#0f4724}h3{font-size:15px}table{border-collapse:collapse;width:100%;font-size:14px}th,td{border:1px solid #ccc;padding:6px 9px;text-align:left;vertical-align:top}th{background:#f1efe6}pre{background:#f1efe6;padding:12px;border-radius:8px;overflow-x:auto}code{background:#f1efe6;padding:1px 5px;border-radius:4px}blockquote{border-left:3px solid #1f6b3a;padding-left:12px;color:#555;margin:8px 0}.msg{margin:12px 0}.u{text-align:right}.u .b{display:inline-block;background:#eef5ef;padding:8px 12px;border-radius:10px;max-width:80%}.a .b{display:inline-block;background:#fff;border:1px solid #ddd;padding:8px 12px;border-radius:10px;max-width:80%}.b p{margin:4px 0}.b ul,.b ol{margin:4px 0;padding-left:22px}.b b{color:#0f4724}</style></head><body>'+html+'</body></html>');
  w.document.close();w.focus();w.print();
}
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;}

(function(){const t=new URLSearchParams(location.search).get("token");if(t)$("#tok").value=t;})();

function enter(){
  TOKEN=$("#tok").value.trim();
  if(!TOKEN) return;
  $("#err").textContent="";
  // 用 stats 验证令牌
  fetch("/api/stats?token="+encodeURIComponent(TOKEN)).then(r=>r.json()).then(d=>{
    if(d.ok){ $("#login").style.display="none"; $("#data").style.display="block"; loadForm(); loadSessions(); }
    else fail();
  }).catch(fail);
  // 同时用 sessions 验证(确保两个接口都通)
  fetch("/api/sessions?token="+encodeURIComponent(TOKEN)).then(r=>{if(r.status===403)fail();}).catch(()=>{});
}
function fail(){ $("#err").textContent="令牌无效或服务不可用。"; $("#data").style.display="none"; $("#login").style.display="block"; }

function switchTab(name){
  $(".tab.active").classList.remove("active");
  $(".pane.on").classList.remove("on");
  if(name==="form"){ $("#t-form").classList.add("active"); $("#pane-form").classList.add("on"); }
  else { $("#t-chat").classList.add("active"); $("#pane-chat").classList.add("on"); }
}

/* ---------- 问卷 ---------- */
function loadForm(){
  fetch("/api/stats?token="+encodeURIComponent(TOKEN)).then(r=>r.json()).then(renderTally).catch(()=>{});
  fetch("/api/answers?token="+encodeURIComponent(TOKEN)).then(r=>r.json()).then(d=>{CHAT_ANS=d.rows||[];renderRows();}).catch(()=>{});
}
let CHAT_ANS=[];
function renderTally(d){
  $("#cnt").textContent=d.total;
  const el2=$("#tally"); el2.innerHTML="";
  if(!d.total){el2.innerHTML='<div class="empty">还没有人提交问卷。</div>';return;}
  const max=Math.max(...Object.values(d.tally||{}).flatMap(a=>a.map(x=>x.count)),1);
  for(const q in d.tally){
    const box=el('<div class="tally"><div class="q"></div></div>');
    box.querySelector(".q").textContent=q;
    for(const o of d.tally[q]){
      const pct=Math.round(o.count/max*100);
      const r=el('<div class="row"><div style="min-width:260px"></div><div class="barbg"><div class="barfg"></div></div><div class="cnt"></div></div>');
      r.children[0].textContent=o.option; r.querySelector(".barfg").style.width=pct+"%"; r.querySelector(".cnt").textContent=o.count;
      box.appendChild(r);
    }
    el2.appendChild(box);
  }
}
function renderRows(){
  const e=$("#rows");
  if(!CHAT_ANS.length){e.innerHTML='<div class="empty">还没有人提交问卷。</div>';return;}
  e.innerHTML="";
  CHAT_ANS.slice().reverse().forEach(r=>{
    const c=el('<div class="card"><div class="who"></div><div class="meta"></div><div class="a"></div></div>');
    c.querySelector(".who").textContent=r.name||"匿名";
    c.querySelector(".meta").textContent=(r.role||"")+" · "+(r.ts||"").replace("T"," ")+" · IP "+(r.ip||"");
    const a=c.querySelector(".a");
    for(const k in r.answers){const d=el('<div><b></b></div>');d.querySelector("b").textContent=k+"：";a.appendChild(d);a.appendChild(document.createTextNode(r.answers[k]));}
    if(r.note){const n=el('<div class="note"></div>');n.textContent="备注："+r.note;c.appendChild(n);}
    e.appendChild(c);
  });
}
function exportJSON(){dl(new Blob([JSON.stringify(CHAT_ANS,null,2)],{type:"application/json"}),"hc-survey-answers.json");}
function exportCSV(){
  const keys=new Set();CHAT_ANS.forEach(r=>Object.keys(r.answers).forEach(k=>keys.add(k)));
  const cols=["ts","name","role",...keys,"note"];
  const lines=[cols.map(csv).join(",")];
  CHAT_ANS.forEach(r=>lines.push(cols.map(c=>csv(c==="ts"?r.ts:c==="name"?r.name:c==="role"?r.role:c==="note"?r.note:(r.answers[c]||""))).join(",")));
  dl(new Blob([lines.join("\n")],{type:"text/csv;charset=utf-8"}),"hc-survey-answers.csv");
}
function csv(v){v=String(v==null?"":v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function dl(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}

/* ---------- 访谈记录 ---------- */
function loadSessions(){
  fetch("/api/sessions?token="+encodeURIComponent(TOKEN)).then(r=>r.json()).then(d=>{
    if(!d.ok) return;
    $("#scnt").textContent=d.count;
    CHAT=d.sessions||[];
    const e=$("#slist"); e.innerHTML="";
    if(!CHAT.length){e.innerHTML='<div class="empty">还没有访谈记录。</div>';return;}
    CHAT.forEach(s=>{
      const it=el('<div class="item"><div class="who"></div><div class="role"></div><div class="info"></div><div class="badge">轮数</div><div class="badge">摘要</div></div>');
      it.querySelector(".who").textContent=s.name||"匿名";
      it.querySelector(".role").textContent=s.role||"";
      it.querySelectorAll(".info")[0].textContent=(s.updated||"").replace("T"," ")+" · "+s.id;
      const bs=it.querySelectorAll(".badge");
      bs[0].textContent=s.turns+" 轮";
      bs[1].textContent=s.has_req?"有摘要":"无";
      if(s.has_req) bs[1].classList.add("req");
      it.onclick=()=>openSession(s.id);
      e.appendChild(it);
    });
  }).catch(()=>{});
}
function openSession(id){
  fetch("/api/session/"+id+"?token="+encodeURIComponent(TOKEN)).then(r=>r.json()).then(d=>{
    if(!d.ok) return;
    const s=d.session;
    _sessCache[id]=s;
    const box=$("#chatDetail"); box.innerHTML="";
    box.appendChild(el('<button class="btn back" onclick="backToList()">← 返回列表</button>'));
    const head=el('<div class="dlghead"></div>');
    const t=el('<h2></h2>'); t.textContent=(s.name||"匿名")+" · "+(s.role||""); head.appendChild(t);
    const ex=el('<button class="btn" onclick="exportTranscript(\''+id+'\')">⤵ 导出本场访谈(MD)</button>');
    head.appendChild(ex);
    const pr=el('<button class="btn" onclick="printTranscript(\''+id+'\')">🖨 打印本场</button>');
    head.appendChild(pr);
    box.appendChild(head);
    const dlg=el('<div class="dlg"></div>');
    (s.msgs||[]).forEach(m=>{
      const isU=m.role==="user";
      const row=el('<div class="m '+(isU?"u":"a")+'"><div class="b"></div></div>');
      row.querySelector(".b").innerHTML=renderMd(m.content);
      dlg.appendChild(row);
    });
    box.appendChild(dlg);
    if(s.requirements_md){
      const rb=el('<div class="reqbox"><h3>📋 已生成的需求摘要</h3><div class="seg"><button class="btn" id="viewRendered" onclick="mdView(\'rendered\')">排版视图</button><button class="btn" id="viewSrc" onclick="mdView(\'src\')">源码</button></div><div class="mdbody" id="mdRendered"></div><pre class="mdsrc" id="mdSrc"></pre><div style="margin-top:10px"><button class="btn" onclick="copyReq()">复制 Markdown</button> <button class="btn" onclick="dlReq()">下载 .md</button> <button class="btn" onclick="printReqBox()">🖨 打印</button></div></div>');
      const md=s.requirements_md;
      rb.querySelector("#mdSrc").textContent=md;
      rb.querySelector("#mdRendered").innerHTML=sanitizeMd(marked.parse(md));
      rb.id="reqbox"; box.appendChild(rb);
      mdView('rendered');
    }
    $("#chatList").style.display="none";
    box.style.display="block";
    window.scrollTo(0,0);
  }).catch(()=>{});
}
function backToList(){ $("#chatDetail").style.display="none"; $("#chatList").style.display="block"; }
function printReqBox(){const r=$("#mdRendered");printMd(r?r.innerHTML:"","本草链需求摘要");}
function copyReq(){const t=$("#mdSrc").textContent;navigator.clipboard.writeText(t).then(()=>alert("已复制 Markdown"));}
function dlReq(){const b=new Blob([$("#mdSrc").textContent],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="herbchain-需求.md";a.click();}
function sanitizeMd(html){
  const d=el('<div></div>'); d.innerHTML=html;
  d.querySelectorAll('script,style,iframe,object,embed').forEach(n=>n.remove());
  d.querySelectorAll('*').forEach(n=>{[...n.attributes].forEach(a=>{if(/^on/i.test(a.name)||a.name==='href'&&/^\s*javascript:/i.test(a.value))n.removeAttribute(a.name);});});
  return d.innerHTML;
}
function mdView(mode){
  const r=$("#mdRendered"), s=$("#mdSrc");
  if(mode==='src'){r.style.display='none';s.style.display='block';$("#viewSrc").classList.add('green');$("#viewRendered").classList.remove('green');}
  else {r.style.display='block';s.style.display='none';$("#viewRendered").classList.add('green');$("#viewSrc").classList.remove('green');}
}
// 缓存已加载的会话,供导出复用
const _sessCache={};
function exportTranscript(id){
  const s=_sessCache[id];
  if(!s){alert("会话数据未加载");return;}
  const lines=["# 本草链需求访谈记录","","**访谈对象**："+(s.name||"匿名")+"  ","**角色**："+(s.role||"-")+"  ",
               "**时间**："+(s.updated||s.created||"").replace("T"," ")+"  ","**来源IP**："+(s.ip||"-")+"  ",
               "**轮数**："+Math.floor((s.msgs||[]).length/2)+"","","---","",""];
  (s.msgs||[]).forEach((m,i)=>{
    const who=m.role==="user"?"💬 用户":"🧑‍💼 分析师";
    lines.push("## "+who+" （第"+(Math.floor(i/2)+1)+"轮）");
    lines.push("");
    lines.push(m.content);
    lines.push("");
  });
  if(s.requirements_md){lines.push("---","","# 附:需求摘要","",""+s.requirements_md,"");}
  const md=lines.join("\n");
  const m=$("#mdModal"); m.classList.add("on");
  $("#mdModalSrc").textContent=md;
  $("#mdModalRendered").innerHTML=sanitizeMd(marked.parse(md));
  mdView2('rendered');
  m.dataset.md=md;
}
function mdView2(mode){
  const r=$("#mdModalRendered"), s=$("#mdModalSrc");
  if(mode==='src'){r.style.display='none';s.style.display='block';}
  else {r.style.display='block';s.style.display='none';}
}
function closeMdModal(){$("#mdModal").classList.remove("on");}
function copyMdModal(){navigator.clipboard.writeText($("#mdModal").dataset.md).then(()=>alert("已复制 Markdown"));}
function dlMdModal(){const b=new Blob([$("#mdModal").dataset.md],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="herbchain-访谈记录.md";a.click();}
function printTranscript(id){
  const s=_sessCache[id];if(!s){alert("会话数据未加载");return;}
  let html="<h1>本草链需求访谈记录</h1>";
  html+="<p><b>访谈对象：</b>"+esc(s.name||"匿名")+"　<b>角色：</b>"+esc(s.role||"-")+"<br><b>时间：</b>"+esc((s.updated||s.created||"").replace("T"," "))+"　<b>来源IP：</b>"+esc(s.ip||"-")+"</p><hr>";
  (s.msgs||[]).forEach((m,i)=>{
    const who=m.role==="user"?"💬 用户":"🧑‍💼 分析师";
    html+="<div class='msg "+(m.role==="user"?"u":"a")+"'><div class='b'>"+renderMd(m.content)+"</div></div>";
  });
  if(s.requirements_md){html+="<hr><h2>附：需求摘要</h2>"+renderMd(s.requirements_md);}
  printMd(html,"本草链访谈记录 · "+(s.name||"匿名"));
}
</script>
